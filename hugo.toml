baseURL = 'https://hannah.eikens.com/'
locale = 'en-us'
title = 'Hannah Eikens'
theme = 'minimal-black'

# Enable search index generation and web app manifest
[outputs]
  home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[outputFormats.WebAppManifest]
  mediaType = "application/manifest+json"
  rel = "manifest"
  baseName = "manifest"
  isPlainText = true
  notAlternative = true

[params]
  brand = "Hannah Eikens"
  description = "A portfolio website demonstrating my academic work, as well as my projects combining music and technology"

  # Theme credit link shown in the footer ("Built with Hugo / Minimal Black")
  themeGit = "https://gitlab.com/jimchr12/hugo-minimal-black"

  # Favicon - Place your favicon files in /static/ directory
  # Supported formats: .ico, .png, .svg
  # favicon = "icons/favicon.svg"
  # appleTouchIcon = "apple-touch-icon.png"

  # Logo (optional)
  # logo = "images/logo.png"

  # Project and blog intro text
  projectsIntro = "Selected projects to display list." # Can be empty
  blogIntro = "" # Can be empty

  # Web App Manifest Configuration (PWA support)
  [params.manifest]
    themeColor = "#ffffff"
    backgroundColor = "#000000"
    categories = ["blog", "portfolio", "developer"]

    # Custom icon configuration (optional)
    # If not specified, defaults to /icons/android-chrome-*.png
    # [[params.manifest.icons]]
    #   src = "/icons/android-chrome-192x192.png"
    #   sizes = "192x192"
    #   type = "image/png"
    #   purpose = "any maskable"

  # Theme Configuration
  [params.theme]
    defaultTheme = "dark"  # Options: "light", "dark", "system"

  # Home Page Configuration
  [params.home]
    sections = ["hero", "now", "projects", "tech-marquee"]
    showNowSection = true
    showFeaturedProjects = true
    showLatestPosts = true
    featuredProjectsLimit = 3
    latestPostsLimit = 3
    projectsTitle = "Selected Work"
    projectsSubtitle = ""
    blogTitle = "Latest Writing"
    blogSubtitle = ""
    techMarqueeLabel = "Experienced In"

    # Technology Stack Display
    [[params.home.tech]]
      label = "Python"
      icon = "devicon-python-plain"

    [[params.home.tech]]
      label = "Java"
      icon = "devicon-java-plain"

    [[params.home.tech]]
      label = "Arduino"
      icon = "devicon-arduino-plain"  

    [[params.home.tech]]
      label = "C++"
      icon = "devicon-cplusplus-plain"    

    [[params.home.tech]]
      label = "Raspberry Pi"
      icon = "devicon-raspberrypi-plain"

    [[params.home.tech]]
      label = "Processing"
      icon = "devicon-processing-plain"

    [[params.home.tech]]
      label = "MIDI"
      icon = "fa-solid fa-music"

    [[params.home.techReverse]]
      label = "Autodesk Fusion"
      icon = "devicon-fusion-plain"

    [[params.home.techReverse]]
      label = "Anaconda"
      icon = "devicon-anaconda-plain"

    [[params.home.techReverse]]
      label = "Git"
      icon = "devicon-git-plain"

    [[params.home.techReverse]]
      label = "Blender"
      icon = "devicon-blender-original"  

    [[params.home.techReverse]]
      label = "VS Code"
      icon = "devicon-vscode-plain"   

    [[params.home.techReverse]]
      label = "Embedded C"
      icon = "devicon-embeddedc-plain" 

    [[params.home.techReverse]]
      label = "C"
      icon = "devicon-c-plain" 

    [[params.home.techReverse]]
      label = "GitHub"
      icon = "devicon-github-plain"          

    [[params.home.techReverse]]
      label = "Jupyter"
      icon = "devicon-jupyter-plain" 

    [[params.home.techReverse]]
      label = "PlatformIO"
      icon = "fa-solid fa-microchip"  

    [[params.home.techReverse]]
      label = "Pico-SDK"
      icon = "fa-solid fa-microchip"  

    [[params.home.techReverse]]
      label = "I2C"
      icon = "fa-solid fa-network-wired"  

    [[params.home.techReverse]]
      label = "SPI"
      icon = "fa-solid fa-network-wired"

    [[params.home.techReverse]]
      label = "UART"
